<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Work</title>
</head>
<body style="display: flex; flex-direction: column; align-items: center; padding: 20px;">
    <!--Let’s first put this project up on your GitHub profile. Log in to your GitHub account and create a public repository named “word-counter-${first name}-${last name}”, where “${first name}” is your first name and “${last name}” is your last name. Initialize it with a README. Clone the repo locally and move to a new feature branch, where you’ll do all your work.



For this project, your task is to build a basic one-page application that counts the number of letters, words and sentences in a user-inputted block of text, as well as any other metrics you find interesting. At the very minimum, there will be one text input field and somewhere for the count information to appear. 


Bonus: Add a button to your application that when clicked, generates a random background of your choosing 🎨
-->
    <h1>Word Counter Application</h1>
    <textarea id="textInput" rows="10" cols="50" placeholder="Type or paste your text here..."></textarea>
    <div>
        <button id="countButton">Count Words</button>
        <button id="randomBgButton">Change Background</button>
    </div>
    <div id="results">
        <p>Letters: <span id="letterCount">0</span></p>
        <p>Words: <span id="wordCount">0</span></p>
        <p>Sentences: <span id="sentenceCount">0</span></p>
    </div>

    <script>
        document.getElementById('countButton').addEventListener('click', function() {
            const text = document.getElementById('textInput').value;
            const letterCount = text.replace(/[^a-zA-Z]/g, '').length;
            const wordCount = text.trim().split(/\s+/).filter(word => word.length > 0).length;
            const sentenceCount = text.split(/[.!?]+/).filter(sentence => sentence.trim().length > 0).length;

            document.getElementById('letterCount').innerText = letterCount;
            document.getElementById('wordCount').innerText = wordCount;
            document.getElementById('sentenceCount').innerText = sentenceCount;
        });

        document.getElementById('randomBgButton').addEventListener('click', function() {
            const randomColor = '#' + Math.floor(Math.random()*16777215).toString(16);
            document.body.style.backgroundColor = randomColor;
        });
    </script>
</body>
</html>
